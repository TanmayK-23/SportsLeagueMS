<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sports League Management System — manage players, teams, and matches.">
    <title>{% block title %}SLMS{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ─── DESIGN TOKENS (DESIGN.md — Raycast Design System) ─────────────────── */
        :root {
            --bg: #07080a;
            --surface: #101111;
            --surface-card: #1b1c1e;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.10);
            --text-primary: #f9f9f9;
            --text-secondary: #9c9c9d;
            --text-dim: #6a6b6c;
            --accent-red: #FF6363;
            --accent-blue: hsl(202, 100%, 67%);
            --accent-green: hsl(151, 59%, 59%);
            --shadow-ring: rgb(27, 28, 30) 0px 0px 0px 1px, rgb(7, 8, 10) 0px 0px 0px 1px inset;
            --shadow-btn: rgba(255, 255, 255, 0.05) 0px 1px 0px 0px inset, rgba(0, 0, 0, 0.20) 0px -1px 0px 0px inset;

            /* Glassmorphism tokens */
            --glass-bg: rgba(16, 17, 17, 0.95);
            --glass-border: rgba(255, 255, 255, 0.09);
            --glass-blur: blur(8px);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255, 255, 255, 0.06) inset;
            --glass-header: rgba(255, 255, 255, 0.07);
        }

        /* ─── RESET ──────────────────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ─── BASE ───────────────────────────────────────────────────────────────── */
        body {
            font-family: 'Inter', system-ui, sans-serif;
            font-feature-settings: 'calt', 'kern', 'liga', 'ss03';
            letter-spacing: 0.2px;
            background: #07080a;
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ─── RED SPOTLIGHT GLOW ─────────────────────────────────────────────────── */
        .red-spotlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 35% at 50% -5%, rgba(40, 100, 255, 0.30) 0%, transparent 70%),
                radial-gradient(ellipse 70% 40% at 50% 105%, rgba(40, 100, 255, 0.60) 0%, transparent 70%);
        }

        /* ─── NAVBAR (Raycast Floating Pill) ──────────────────────────────────────── */
        .navbar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            padding: 16px 24px 0;
            pointer-events: none;
        }

        .navbar {
            pointer-events: all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 76px;
            max-width: 1400px;
            width: 100%;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        .navbar-brand {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .navbar-brand .brand-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: linear-gradient(135deg, #FF6363, #e03030);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 500;
            font-size: 17px;
            letter-spacing: 0.3px;
            padding: 10px 22px;
            border-radius: 100px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-links a.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Spacer for fixed navbar */
        .navbar-spacer {
            height: 108px;
        }

        /* ─── GLASSMORPHISM CARD ─────────────────────────────────────────────────── */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
        }

        /* ─── GLASSMORPHISM TABLE ────────────────────────────────────────────────── */
        .glass-table-wrap {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
            position: relative;
        }

        /* Subtle top-edge highlight */
        .glass-table-wrap::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent);
            pointer-events: none;
        }

        .glass-table-wrap table {
            width: 100%;
            border-collapse: collapse;
        }

        .glass-table-wrap thead th {
            padding: 16px 24px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: var(--text-dim);
            background: var(--glass-header);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .glass-table-wrap tbody td {
            padding: 18px 24px;
            font-size: 17px;
            font-weight: 500;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .glass-table-wrap tbody tr:last-child td {
            border-bottom: none;
        }

        .glass-table-wrap tbody tr {
            transition: background 0.18s ease;
        }

        .glass-table-wrap tbody tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Sport badge in table */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: var(--surface-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .badge.blue {
            background: rgba(85, 179, 255, 0.12);
            color: var(--accent-blue);
            border-color: rgba(85, 179, 255, 0.2);
        }

        .badge.green {
            background: rgba(95, 201, 146, 0.12);
            color: var(--accent-green);
            border-color: rgba(95, 201, 146, 0.2);
        }

        /* ─── FORM INPUTS ────────────────────────────────────────────────────────── */
        .form-input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 17px;
            font-weight: 500;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input::placeholder {
            color: var(--text-dim);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(85, 179, 255, 0.12);
        }

        /* ─── BUTTONS ────────────────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: var(--shadow-btn);
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .btn:hover {
            opacity: 0.65;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.14);
        }

        /* ─── PAGE FADE-IN ───────────────────────────────────────────────────────── */
        .page-content {
            position: relative;
            z-index: 1;
            animation: fadeUp 0.45s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── FOOTER ─────────────────────────────────────────────────────────────── */
        .footer {
            text-align: center;
            padding: 28px 40px;
            color: var(--text-dim);
            font-size: 15px;
            letter-spacing: 0.3px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }

        /* ─── UTILS ──────────────────────────────────────────────────────────────── */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
    </style>

    {% block head %}{% endblock %}
</head>

<body>

    <!-- Red Spotlight Glow -->
    <div class="red-spotlight"></div>

    <!-- Raycast Floating Pill Navbar -->
    <div class="navbar-wrapper">
        <nav class="navbar">
            <a class="navbar-brand" href="/">
                <span class="brand-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                    </svg>
                </span>
                SLMS
            </a>
            <div class="nav-links">
                <a href="/" {% if active_page=='home' %}class="active" {% endif %}>Home</a>
                <a href="/view_players" {% if active_page=='players' %}class="active" {% endif %}>Players</a>
                <a href="/tournaments" {% if active_page=='tournaments' %}class="active" {% endif %}>Tournaments</a>
                <a href="/teams" {% if active_page=='teams' %}class="active" {% endif %}>Teams</a>
                <a href="/matches" {% if active_page=='matches' %}class="active" {% endif %}>Matches</a>
                <a href="/referees" {% if active_page=='referees' %}class="active" {% endif %}>Referees</a>
                {% if is_admin %}
                <a href="/admin/dashboard" {% if active_page=='admin' %}class="active" {% endif %}
                    style="color: #FF6363; display: inline-flex; align-items: center; gap: 6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    Admin
                </a>
                {% endif %}
            </div>
        </nav>
    </div>
    <div class="navbar-spacer"></div>

    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        DBMS Mini Project &nbsp;•&nbsp; Global Sports League &nbsp;•&nbsp; 2026
    </div>

    {% block scripts %}{% endblock %}

</body>

</html>
